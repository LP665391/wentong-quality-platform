appId: com.wentong.ai-quality-inspector
productName: Ai质检平台
copyright: Copyright © 2026 WenTong

directories:
  output: release
  buildResources: resources
  app: packages/app/main

files:
  - dist/**/*

extraResources:
  - from: ../../packages/app/renderer/dist
    to: renderer-dist
    filter:
      - "**/*"
  - from: ../../modules
    to: modules
    filter:
      - "*/dist/**"
  - from: ../../core
    to: core
    filter:
      - "*/dist/**"

asar: true
asarUnpack:
  - "**/*.node"
  - "**/onnxruntime-node/**"

mac:
  target:
    - dmg
    - zip
  icon: resources/icons/icon.icns
  category: public.app-category.business
  artifactName: "${productName}-${version}-${arch}.${ext}"

win:
  target:
    - nsis
    - portable
  icon: resources/icons/icon.ico
  artifactName: "${productName}-${version}-setup.${ext}"

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Ai质检平台

linux:
  target:
    - AppImage
  icon: resources/icons/icon.png
  category: Office
