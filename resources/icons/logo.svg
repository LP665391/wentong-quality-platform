<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533afd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4434d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533afd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  
  <!-- 文档图标 -->
  <rect x="30" y="28" width="36" height="48" rx="4" fill="white" opacity="0.95"/>
  <rect x="36" y="36" width="24" height="3" rx="1.5" fill="#533afd" opacity="0.3"/>
  <rect x="36" y="43" width="20" height="3" rx="1.5" fill="#533afd" opacity="0.3"/>
  <rect x="36" y="50" width="22" height="3" rx="1.5" fill="#533afd" opacity="0.3"/>
  <rect x="36" y="57" width="16" height="3" rx="1.5" fill="#533afd" opacity="0.3"/>
  
  <!-- AI 扫描线 -->
  <rect x="28" y="72" width="40" height="3" rx="1.5" fill="#7c6bff" opacity="0.8"/>
  
  <!-- 对勾/质检通过标记 -->
  <circle cx="72" cy="72" r="22" fill="url(#accent)"/>
  <path d="M62 72 L69 79 L82 65" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- AI 光点装饰 -->
  <circle cx="88" cy="36" r="4" fill="#7c6bff" opacity="0.6"/>
  <circle cx="92" cy="48" r="2.5" fill="#7c6bff" opacity="0.4"/>
  <circle cx="86" cy="56" r="3" fill="#7c6bff" opacity="0.5"/>
</svg>
